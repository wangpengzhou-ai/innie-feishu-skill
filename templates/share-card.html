<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>Share — innie@feishu.skill</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Allison&family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,300;1,6..72,400&family=IBM+Plex+Sans:wght@300;400;500;600&family=Noto+Serif+SC:wght@300;400;500;600&family=Noto+Sans+SC:wght@300;400;500&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #2a4a76;
    --bg-deep: #1f3a60;
    --bg-deeper: #152a47;
    --ink: #e8e4d3;
    --ink-soft: #cfcaba;
    --ink-mute: #9aa6b8;
    --rule: rgba(232, 228, 211, 0.18);
    --rule-soft: rgba(232, 228, 211, 0.10);
    --accent: #d7cfa9;
  }
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 48px 24px 72px;
    font-family: "IBM Plex Sans", "Noto Sans SC", system-ui, sans-serif;
    color: var(--ink);
    background-color: #1f3a60;
    background-image:
      radial-gradient(1400px 900px at 50% -10%, rgba(90, 130, 180, 0.35) 0%, transparent 55%),
      radial-gradient(900px 700px at 50% 110%, rgba(8, 18, 36, 0.6) 0%, transparent 60%),
      radial-gradient(60% 100% at 0% 50%, rgba(8, 18, 36, 0.35) 0%, transparent 55%),
      radial-gradient(60% 100% at 100% 50%, rgba(8, 18, 36, 0.35) 0%, transparent 55%),
      radial-gradient(circle at center, rgba(232, 228, 211, 0.11) 1px, transparent 1.5px),
      linear-gradient(180deg, #355a8a 0%, #2a4a76 45%, #1f3a60 100%);
    background-size: auto, auto, auto, auto, 48px 48px, auto;
    background-position: center top, center bottom, left center, right center, center center, center center;
    background-attachment: fixed;
    position: relative;
  }

  .card {
    width: min(760px, 100%);
    background-color: var(--bg);
    background-image:
      linear-gradient(to right, rgba(232, 228, 211, 0.035) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(232, 228, 211, 0.035) 1px, transparent 1px),
      linear-gradient(to right, rgba(232, 228, 211, 0.05) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(232, 228, 211, 0.05) 1px, transparent 1px);
    background-size: 32px 32px, 32px 32px, 160px 160px, 160px 160px;
    color: var(--ink);
    position: relative;
    z-index: 3;
    border: 1px solid var(--rule);
    padding: 56px 64px 44px;
    box-shadow: 0 40px 80px -30px rgba(0,0,0,0.55), 0 10px 30px -10px rgba(0,0,0,0.35);
    overflow: hidden;
  }

  /* subtle grain overlay */
  .grain {
    position: absolute; inset: 0;
    pointer-events: none;
    opacity: 0.035;
    mix-blend-mode: overlay;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  }

  /* HEADER */
  .head {
    display: flex; justify-content: space-between; align-items: flex-start;
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 45px;
  }
  .head .handle { display: flex; align-items: center; gap: 10px; }
  .head .dot { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; display: inline-block; }
  .head .date { font-variant-numeric: tabular-nums; text-align: right; }

  /* MARK */
  .mark {
    font-family: "Allison", cursive;
    font-weight: 400;
    color: var(--ink);
    font-size: 64px;
    line-height: 1;
    margin: 0;
  }

  /* SECTIONS */
  #sc-sections { margin-top: 45px; }
  .sec + .sec { margin-top: 60px; }
  .sec-head { display: flex; gap: 22px; align-items: baseline; margin-bottom: 16px; }
  .sec-num {
    font-family: "Newsreader", serif;
    font-weight: 400; font-size: 28px;
    color: var(--accent); letter-spacing: 0.02em;
    line-height: 1; flex-shrink: 0; min-width: 36px;
  }
  .sec-title {
    font-family: "Noto Serif SC", "Newsreader", serif;
    font-weight: 400; font-size: 19.5px; line-height: 1.55;
    color: var(--ink); letter-spacing: 0.005em;
    text-wrap: pretty; margin: 0;
  }
  .sec-title em {
    font-style: normal; font-weight: 400;
    color: var(--accent);
  }
  .sec-body {
    font-family: "Noto Sans SC", "IBM Plex Sans", sans-serif;
    font-weight: 300; font-size: 14.5px; line-height: 1.95;
    letter-spacing: 0.015em; color: var(--ink-soft);
    text-wrap: pretty; padding-left: 58px;
  }
  .sec-body p { margin: 0 0 8px; }
  .sec-body p:last-child { margin-bottom: 0; }
  .sec-body .pull { color: var(--ink); font-weight: 400; }
  .sec-body .tag { font-family: "Noto Serif SC", "Newsreader", serif; font-style: normal; color: var(--accent); }
  /* FOOTER */
  .foot {
    margin-top: 64px; padding-top: 28px;
    display: flex; justify-content: space-between; align-items: flex-end;
    gap: 16px;
  }
  .foot .logo { width: 40px; height: 40px; opacity: 0.5; display: block; }
  .foot .logo path { fill: var(--ink); }
  .foot .qr-box { width: 40px; height: 40px; background: var(--bg); display: block; }
  .foot .qr-box img { width: 100%; height: 100%; display: block; image-rendering: pixelated; }

  @media (max-width: 640px) {
    body { padding: 24px 12px 48px; }
    .card { padding: 40px 26px 32px; }
    .sec-body { padding-left: 0; }
    .sec-head { gap: 14px; }
    .foot .logo, .foot .qr-box { width: 36px; height: 36px; }
  }
</style>
</head>
<body>

<article class="card">
  <div class="grain"></div>

  <header class="head">
    <div class="handle">
      <span class="dot"></span>
      <span>innie@feishu.skill</span>
    </div>
    <div class="date" id="sc-date"></div>
  </header>
  <div class="mark">hidden truths about your innie</div>

  <div id="sc-sections"></div>

  <footer class="foot">
    <svg class="logo" viewBox="207 210 210 160" xmlns="http://www.w3.org/2000/svg" aria-label="Feishu">
      <g>
        <path d="M 245.9118,214.7869 C 245.9078,214.7839 245.9058,214.7799 245.9028,214.7769 L 245.8998,214.7749 Z"/>

        <path d="M 211.7658,263.8818 C 211.4358,263.5888 211.0328,263.3808 210.5808,263.3078 C 210.1418,263.2348 209.6778,263.2828 209.2618,263.4418 C 208.8468,263.6128 208.4928,263.8938 208.2368,264.2478 C 207.9798,264.6018 207.8458,265.0298 207.8458,265.4568 L 207.8458,341.6268 C 207.8458,342.6778 208.1138,343.7158 208.6268,344.6558 C 209.1398,345.5838 209.8968,346.3778 210.8128,346.9638 C 231.6728,360.1908 249.5878,367.3958 274.6118,367.7378 C 299.6358,368.0798 324.2438,361.5338 345.4818,348.8818 C 353.2978,344.2288 354.8488,342.2498 361.3948,336.1928 C 349.3658,339.2948 338.3498,338.4158 326.6988,335.4108 C 277.5058,322.6978 247.5728,297.0028 211.7418,263.8818 Z"/>

      </g>
    </svg>
    <div class="qr-box">
      <img alt="QR code" src="https://api.qrserver.com/v1/create-qr-code/?size=240x240&margin=0&ecc=M&color=b8b4a4&bgcolor=2a4a76&data=https%3A%2F%2Fgithub.com%2Fwangpengzhou-ai%2Finnie-feishu-skill">
    </div>
  </footer>
</article>

<script>
/* __INJECT_CARD_DATA__ */

(function () {
  var d = CARD_DATA;
  var ROMAN = ["I", "II", "III"];

  // Date: year / month
  var now = new Date();
  document.getElementById("sc-date").textContent =
    now.getFullYear() + "\u00a0/\u00a0" + String(now.getMonth() + 1).padStart(2, "0");

  // Render truth sections
  var container = document.getElementById("sc-sections");
  d.truths.forEach(function (t, i) {
    var paras = (t.body || "").replace(/\\n/g, "\n").split(/\n\n+/).map(function (p) { return p.trim(); }).filter(Boolean);
    var lastPara = paras.length > 1 ? paras.pop() : null;

    var bodyHtml = paras.map(function (p) { return "<p>" + p + "</p>"; }).join("");
    if (lastPara) bodyHtml += '<p class="pull">' + lastPara + "</p>";
    
    var sec = document.createElement("section");
    sec.className = "sec";
    sec.innerHTML =
      '<div class="sec-head">' +
        '<div class="sec-num">' + (ROMAN[i] || t.num) + ".</div>" +
        '<h2 class="sec-title">' + t.title + "</h2>" +
      "</div>" +
      '<div class="sec-body">' + bodyHtml + "</div>";
    container.appendChild(sec);
  });
})();
</script>
</body>
</html>
